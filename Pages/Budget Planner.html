<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Estimate your trip budget and save plans locally." />
  <title>TravelNest | Trip Budget Planner</title>
  <link rel="icon" type="image/svg+xml" href="../Svgs/Favicon.svg" />
  <link rel="manifest" href="../PWA/Manifest.json" />
  <link rel="stylesheet" href="../Stylesheets/Global.css" />
  <link rel="stylesheet" href="../Stylesheets/Budget Planner.css" />
</head>

<body data-page="budget">
  <div id="site-header"></div>
  <main id="main-content">
    <h1>Trip Budget Planner</h1>
    <div class="split-layout">
      <div class="budget-planner-column">
        <form id="budget-form" class="surface-panel">
          <label>Destination
            <input id="destination" type="text" />
          </label>
          <label>Number of days
            <input id="days" type="text" />
          </label>
          <label>Daily budget ($)
            <input id="daily-budget" type="text" />
          </label>
          <div class="budget-legend">
            <span><i class="legend-dot legend-dot--low"></i> Low</span>
            <span><i class="legend-dot legend-dot--moderate"></i> Moderate</span>
            <span><i class="legend-dot legend-dot--luxury"></i> Luxury</span>
          </div>
          <button class="btn" type="submit">Calculate Budget</button>
        </form>
        <section id="budget-output" class="budget-output surface-panel" aria-live="polite"></section>
      </div>
      <section class="saved-budgets-column surface-panel">
        <h2>Saved Budgets</h2>
        <ul id="saved-budgets"></ul>
      </section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../Javascripts/Global.js"></script>
  <script src="../Javascripts/Budget Planner.js"></script>
</body>

</html>

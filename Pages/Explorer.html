<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse and filter destinations with details, attractions, and travel costs." />
  <title>TravelNest | Destination Explorer</title>
  <link rel="icon" type="image/svg+xml" href="../Svgs/Favicon.svg" />
  <link rel="manifest" href="../PWA/Manifest.json" />
  <link rel="stylesheet" href="../Stylesheets/Global.css" />
  <link rel="stylesheet" href="../Stylesheets/Explorer.css" />
</head>
<body data-page="explorer">
  <div id="site-header"></div>
  <main id="main-content">
    <header class="page-intro">
      <h1>Destination Explorer</h1>
      <p>Search destinations by name and filter by continent.</p>
    </header>
    <section class="filters">
      <label>
        Search destination
        <input id="search-input" type="text" placeholder="e.g. Kyoto" />
      </label>
      <label>
        Continent
        <select id="continent-filter">
          <option value="all">All continents</option>
        </select>
      </label>
    </section>
    <section id="destination-grid" class="destination-grid"></section>
  </main>
  <div id="destination-modal" class="modal" aria-hidden="true">
    <div class="modal__content glass-effect">
      <button type="button" id="close-modal" class="modal__close" aria-label="Close destination details">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>
  <div id="site-footer"></div>
  <script src="../Javascripts/Destination Data.js"></script>
  <script src="../Javascripts/Global.js"></script>
  <script src="../Javascripts/Explorer.js"></script>
</body>
</html>

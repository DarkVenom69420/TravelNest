<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Get random trip ideas and save favorites to your wishlist." />
  <title>TravelNest | Random Trip Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../Svgs/Favicon.svg" />
  <link rel="manifest" href="../PWA/Manifest.json" />
  <link rel="stylesheet" href="../Stylesheets/Global.css" />
  <link rel="stylesheet" href="../Stylesheets/Random Trip.css" />
</head>

<body data-page="random">
  <div id="site-header"></div>
  <main id="main-content">
    <h1>Random Trip Generator</h1>
    <div class="split-layout split-layout--stretch">
      <form id="random-form" class="surface-panel">
        <label>Travel type
          <select id="travel-type" required>
            <option value="">Choose one</option>
            <option value="adventure">Adventure</option>
            <option value="relaxation">Relaxation</option>
            <option value="cultural">Cultural</option>
            <option value="nature">Nature</option>
          </select>
        </label>
        <label>Budget range
          <select id="budget-range" required>
            <option value="">Choose one</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </label>
        <div class="form-actions">
          <button class="btn" type="submit">Generate Trip</button>
          <button class="btn" type="button" id="surprise-btn">Surprise Me</button>
        </div>
      </form>
      <article id="random-result" class="result surface-panel">
        <p class="result-placeholder">Your generated trip will appear here.</p>
      </article>
    </div>
    <section>
      <h2>Wishlist</h2>
      <ul id="wishlist"></ul>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../Javascripts/Destination Data.js"></script>
  <script src="../Javascripts/Global.js"></script>
  <script src="../Javascripts/Random Trip.js"></script>
</body>

</html>
